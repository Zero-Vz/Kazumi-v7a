---
name: "PR workflow"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - 'static/**'
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - 'fastlane/**'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      signpath_sign:
        description: 'sign binary by signpath'
        required: false
        default: false
        type: boolean
      run_android:
        description: 'manually run android build'
        required: false
        default: false
        type: boolean

jobs:
  changes:
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: "ubuntu-latest"
    permissions:
      pull-requests: read
    outputs:
      # 定义两个输出变量供后面判断
      android: ${{ steps.filter.outputs.android }}
      all: ${{ steps.filter.outputs.all }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            android:
              - 'android/**'
            # 添加 'all' 过滤器，包含 Dart 代码和配置文件的修改
            all:
              - 'lib/**'
              - 'pubspec.yaml'
              - 'assets/**'

  flutter-build-android:
    needs: changes
    # 逻辑修正：如果手动触发 OR (不是草稿 AND (改了安卓原生配置 OR 改了通用代码))
    if: ${{ github.event.inputs.run_android || (! github.event.pull_request.draft && (needs.changes.outputs.android == 'true' || needs.changes.outputs.all == 'true')) }}
    name: "Release for android"
    runs-on: "ubuntu-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          
      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash
        
      - name: Print Flutter version
        run: flutter doctor -v
        shell: bash
        
      - name: Build Flutter for Android
        # 核心修改：指定 target-platform 并开启 split-per-abi
        # 这将生成 app-armeabi-v7a-release.apk 和 app-arm64-v8a-release.apk
        run: flutter build apk --split-per-abi --target-platform android-arm,android-arm64
        shell: bash
        
      - name: Package android build output
        # 重命名并移动文件
        run: |
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk Kazumi_android_canary_v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Kazumi_android_canary_v8a.apk
        shell: bash

      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: android_outputs
          path: Kazumi_android_*.apk
          retention-days: 3 # 建议添加：保留3天，节省空间
